<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | TheMallu</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        :root {
            --bg-dark: #0a0a0a;
            --bg-card: #1a1a1a;
            --accent-red: #e50914;
            --text-main: #f5f5f5;
            --text-muted: #aaaaaa;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            background: linear-gradient(to bottom, rgba(10,10,10,0.8), rgba(10,10,10,1)), url('https://image.tmdb.org/t/p/original/8rpDcsfLJypbO6vtec8OobKXpqc.jpg') center/cover;
        }

        .login-box {
            background: var(--bg-card);
            padding: 3rem;
            border-radius: 12px;
            text-align: center;
            box-shadow: 0 15px 40px rgba(0,0,0,0.8);
            border-top: 4px solid var(--accent-red);
            max-width: 400px;
            width: 90%;
        }

        .login-box h1 {
            font-family: 'Bebas Neue', cursive;
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
            letter-spacing: 1px;
        }

        .login-box p {
            color: var(--text-muted);
            margin-bottom: 2rem;
            font-size: 0.95rem;
        }

        .btn-google {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: 100%;
            background: white;
            color: #333;
            border: none;
            padding: 0.8rem;
            border-radius: 4px;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.2s;
        }

        .btn-google:hover {
            background: #eee;
        }

        .btn-google img {
            width: 20px;
        }
    </style>
</head>
<body>

    <div class="login-box">
        <h1>THE<span style="color: var(--accent-red);">MALLU</span></h1>
        <p>Sign in to read full reviews, cast your votes, and join the community.</p>
        
        <button class="btn-google" id="google-login-btn">
            <img src="https://upload.wikimedia.org/wikipedia/commons/c/c1/Google_%22G%22_logo.svg" alt="Google Logo">
            Continue with Google
        </button>
    </div>

    <script>
        const supabaseUrl = 'https://bmtoevcfrimhwamyqbvc.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJtdG9ldmNmcmltaHdhbXlxYnZjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc1NTg0NzMsImV4cCI6MjA5MzEzNDQ3M30.pqVOFqFX3PWA003vHmINfnFY7yoWAX7W_V15xNRawiE';
        const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

        document.getElementById('google-login-btn').addEventListener('click', async () => {
            const { data, error } = await supabase.auth.signInWithOAuth({
                provider: 'google',
                options: {
                    // Redirects back to home page after successful login
                    redirectTo: window.location.origin + '/index.html' 
                }
            });
            
            if (error) {
                alert("Login failed: " + error.message);
            }
        });

        // Check if already logged in, redirect to home if true
        window.onload = async () => {
            const { data: { session } } = await supabase.auth.getSession();
            if (session) {
                window.location.href = 'index.html';
            }
        };
    </script>
</body>
</html>
