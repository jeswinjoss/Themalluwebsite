<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChuBee | The Hive of Acceptance</title>
    <style>
        :root {
            --honey-yellow: #FFC107;
            --honey-dark: #FF6F00;
            --white: #FFFFFF;
            --text-dark: #3E2723;
        }
        body, html {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--white);
            color: var(--text-dark);
            overflow-x: hidden;
            height: 100%;
        }

        /* --- Loading Screen Styles (Kept as requested) --- */
        #loader {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background-color: var(--white); z-index: 9999;
            transition: opacity 0.8s ease-out, visibility 0.8s;
            display: flex; justify-content: center; align-items: center;
        }
        #loader.hidden { opacity: 0; visibility: hidden; }
        .loader-content { display: flex; flex-direction: column; align-items: center; width: 80%; max-width: 300px; gap: 20px; text-align: center; }
        #loading-logo { width: 100%; max-width: 220px; object-fit: contain; animation: fadeIn 1.5s ease-in forwards; }
        .loader-quote { font-family: 'Georgia', serif; color: #5d4037; font-size: 0.95rem; letter-spacing: 0.05em; text-transform: uppercase; margin-top: 10px; opacity: 0.8; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .progress-container { width: 100%; height: 4px; background-color: #eee; border-radius: 2px; overflow: hidden; }
        .progress-bar { height: 100%; width: 0; background: linear-gradient(90deg, var(--honey-yellow), var(--honey-dark)); animation: fillProgress 5s linear forwards; }
        @keyframes fillProgress { 0% { width: 0%; } 100% { width: 100%; } }

        /* --- Main Content Styles --- */
        #main-content { opacity: 0; transition: opacity 1s ease-in 0.5s; text-align: center; min-height: 100vh; display: flex; flex-direction: column; position: relative; }
        body.loaded #main-content { opacity: 1; }
        
        /* Updated Hero Section with Honey Decorations */
        .hero {
            padding: 80px 20px 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            z-index: 1;
        }
        
        /* Honey Decorative Elements */
        .hero::before, .hero::after {
            content: '';
            position: absolute;
            background-color: var(--honey-yellow);
            opacity: 0.3;
            border-radius: 50%;
            z-index: -1;
        }
        .hero::before { width: 200px; height: 200px; top: 10px; left: 10%; filter: blur(40px); }
        .hero::after { width: 150px; height: 150px; top: 50px; right: 10%; filter: blur(30px); }

        .hero-logo {
            width: 180px; /* Increased size */
            height: auto;
            margin-bottom: 10px;
        }

        main { flex-grow: 1; padding: 20px; max-width: 800px; margin: 0 auto; }
        h2 { font-size: 2.2rem; color: var(--text-dark); margin-bottom: 20px; }
        .subtitle { font-size: 1.25rem; color: #555; margin-bottom: 40px; line-height: 1.6; }
        .btn { display: inline-block; padding: 16px 40px; font-weight: bold; background-color: var(--honey-yellow); color: var(--white); text-decoration: none; border-radius: 30px; }
    </style>
</head>
<body>

    <div id="loader">
        <div class="loader-content">
             <img id="loading-logo" src="https://dxtcuekuplihhijepqww.supabase.co/storage/v1/object/public/Assets/20260627_000257.png" alt="ChuBee Logo">
             <div class="progress-container">
                 <div class="progress-bar"></div>
             </div>
             <p class="loader-quote">You deserve a space that celebrates you</p>
        </div>
    </div>

    <div id="main-content">
        <section class="hero">
            <img class="hero-logo" src="https://dxtcuekuplihhijepqww.supabase.co/storage/v1/object/public/Assets/20260627_000257.png" alt="ChuBee Logo">
        </section>
        <main>
            <h2>Welcome to the Hive of Acceptance</h2>
            <p class="subtitle">The ultimate dating and friend-finder platform engineered specifically for the plus-size community.</p>
            <a href="#" class="btn">Find Your Swarm</a>
        </main>
    </div>

    <script>
        window.addEventListener('load', () => {
            setTimeout(() => {
                const loader = document.getElementById('loader');
                loader.classList.add('hidden');
                document.body.classList.add('loaded');
                setTimeout(() => { loader.style.display = 'none'; }, 800);
            }, 5000); 
        });
    </script>
</body>
</html>
