<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChuBee | The Hive of Acceptance</title>
    <style>
        :root {
            --honey-yellow: #FFC107;
            --honey-dark: #FF6F00;
            --white: #FFFFFF;
            --text-dark: #3E2723;
        }
        body, html {
            margin: 0; padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--white);
            color: var(--text-dark);
            overflow-x: hidden;
            height: 100%;
        }

        /* --- Loading Screen Styles --- */
        #loader {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background-color: var(--white); z-index: 9999;
            transition: opacity 0.8s ease-out, visibility 0.8s;
            display: flex; justify-content: center; align-items: center;
        }
        #loader.hidden { opacity: 0; visibility: hidden; }
        .loader-content { display: flex; flex-direction: column; align-items: center; width: 80%; max-width: 300px; gap: 20px; text-align: center; }
        #loading-logo { width: 100%; max-width: 220px; object-fit: contain; animation: fadeIn 1.5s ease-in forwards; }
        .loader-quote { font-family: 'Georgia', serif; color: #5d4037; font-size: 0.95rem; letter-spacing: 0.05em; text-transform: uppercase; margin-top: 10px; opacity: 0.8; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .progress-container { width: 100%; height: 4px; background-color: #eee; border-radius: 2px; overflow: hidden; }
        .progress-bar { height: 100%; width: 0; background: linear-gradient(90deg, var(--honey-yellow), var(--honey-dark)); animation: fillProgress 3.5s linear forwards; }
        @keyframes fillProgress { 0% { width: 0%; } 100% { width: 100%; } }

        /* --- Navigation --- */
        header { display: flex; justify-content: space-between; align-items: center; padding: 20px 40px; background: var(--white); }
        .nav-logo { width: 80px; }
        nav ul { display: flex; list-style: none; gap: 30px; margin: 0; }
        nav a { text-decoration: none; color: var(--text-dark); font-weight: 600; }
        .menu-icon { display: none; cursor: pointer; font-size: 28px; z-index: 1001; }
        
        /* --- Beautiful Hero Section --- */
        .hero {
            padding: 100px 20px;
            text-align: center;
            background: linear-gradient(135deg, #fffcf5 0%, #fff8e1 100%);
            border-bottom-left-radius: 50px;
            border-bottom-right-radius: 50px;
        }
        .hero h2 { font-size: 3.5rem; margin-bottom: 20px; color: var(--text-dark); }
        .hero p { font-size: 1.3rem; color: #6d4c41; margin-bottom: 40px; max-width: 600px; margin-left: auto; margin-right: auto; }
        .btn { 
            display: inline-block; padding: 18px 45px; font-size: 1.1rem; font-weight: bold;
            background-color: var(--honey-yellow); color: var(--white); text-decoration: none;
            border-radius: 50px; transition: transform 0.2s, box-shadow 0.2s;
        }
        .btn:hover { transform: scale(1.05); box-shadow: 0 10px 20px rgba(255, 193, 7, 0.3); }

        /* Mobile Menu */
        #side-nav { position: fixed; right: -250px; top: 0; width: 250px; height: 100%; background: var(--white); box-shadow: -2px 0 5px rgba(0,0,0,0.1); transition: 0.3s; padding-top: 80px; z-index: 1000; }
        #side-nav ul { display: flex; flex-direction: column; list-style: none; padding: 0 20px; gap: 20px; }
        #side-nav a { text-decoration: none; color: var(--text-dark); font-size: 1.2rem; font-weight: 600; display: block; }
        @media (max-width: 768px) { nav ul { display: none; } .menu-icon { display: block; } }
    </style>
</head>
<body>

    <div id="loader">
        <div class="loader-content">
             <img id="loading-logo" src="https://dxtcuekuplihhijepqww.supabase.co/storage/v1/object/public/Assets/20260627_000257.png" alt="ChuBee Logo">
             <div class="progress-container"><div class="progress-bar"></div></div>
             <p class="loader-quote">You deserve a space that celebrates you</p>
        </div>
    </div>

    <div id="main-content" style="opacity:0; transition: opacity 1s ease-in 0.5s;">
        <header>
            <img class="nav-logo" src="https://dxtcuekuplihhijepqww.supabase.co/storage/v1/object/public/Assets/20260627_000257.png" alt="Logo">
            <div class="menu-icon" onclick="toggleMenu()">☰</div>
            <nav>
                <ul>
                    <li><a href="#">Home</a></li>
                    <li><a href="#">About</a></li>
                    <li><a href="#">How this work?</a></li>
                </ul>
            </nav>
        </header>

        <div id="side-nav">
            <ul>
                <li><a href="#">Home</a></li>
                <li><a href="#">About</a></li>
                <li><a href="#">How this work?</a></li>
            </ul>
        </div>

        <section class="hero">
            <h2>The Hive of Acceptance</h2>
            <p>Welcome to the ultimate platform engineered specifically for the plus-size community. Zero judgment, just genuine connections.</p>
            <a href="link.html" class="btn">Join the Waitlist</a>
        </section>
    </div>

    <script>
        function toggleMenu() {
            const nav = document.getElementById('side-nav');
            nav.style.right = (nav.style.right === '0px') ? '-250px' : '0px';
        }
        window.onload = () => {
            setTimeout(() => {
                document.getElementById('loader').classList.add('hidden');
                document.getElementById('main-content').style.opacity = '1';
                setTimeout(() => { document.getElementById('loader').style.display = 'none'; }, 800);
            }, 3500); 
        };
    </script>
</body>
</html>
