<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChuBee | The Hive of Acceptance</title>
    <style>
        :root {
            --honey-yellow: #FFC107;
            --honey-dark: #FF6F00;
            --white: #FFFFFF;
            --text-dark: #3E2723;
        }
        body, html {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--white);
            color: var(--text-dark);
            overflow-x: hidden;
            height: 100%;
        }

        /* --- Loading Screen Styles --- */
        #loader {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background-color: var(--white); z-index: 9999;
            transition: opacity 0.8s ease-out, visibility 0.8s;
            display: flex; justify-content: center; align-items: center;
        }
        #loader.hidden { opacity: 0; visibility: hidden; }
        .loader-content { display: flex; flex-direction: column; align-items: center; width: 80%; max-width: 300px; gap: 20px; text-align: center; }
        #loading-logo { width: 100%; max-width: 220px; object-fit: contain; animation: fadeIn 1.5s ease-in forwards; }
        .loader-quote { font-family: 'Georgia', serif; color: #5d4037; font-size: 0.95rem; letter-spacing: 0.05em; text-transform: uppercase; margin-top: 10px; opacity: 0.8; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .progress-container { width: 100%; height: 4px; background-color: #eee; border-radius: 2px; overflow: hidden; }
        .progress-bar { height: 100%; width: 0; background: linear-gradient(90deg, var(--honey-yellow), var(--honey-dark)); animation: fillProgress 5s linear forwards; }
        @keyframes fillProgress { 0% { width: 0%; } 100% { width: 100%; } }

        /* --- Main Content & Navigation --- */
        #main-content { opacity: 0; transition: opacity 1s ease-in 0.5s; min-height: 100vh; }
        body.loaded #main-content { opacity: 1; }
        
        header { display: flex; justify-content: space-between; align-items: center; padding: 20px 40px; background: var(--white); box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .nav-logo { width: 80px; }
        
        nav ul { display: flex; list-style: none; gap: 30px; margin: 0; }
        nav a { text-decoration: none; color: var(--text-dark); font-weight: 600; }
        
        /* Mobile Menu */
        .menu-icon { display: none; cursor: pointer; font-size: 24px; }
        #side-nav { position: fixed; right: -250px; top: 0; width: 250px; height: 100%; background: var(--white); box-shadow: -2px 0 5px rgba(0,0,0,0.1); transition: 0.3s; padding-top: 60px; z-index: 1000; }
        #side-nav ul { flex-direction: column; padding: 20px; }
        
        @media (max-width: 768px) {
            nav ul { display: none; }
            .menu-icon { display: block; }
        }

        main { padding: 80px 20px; max-width: 800px; margin: 0 auto; text-align: center; }
        h2 { font-size: 2.2rem; margin-bottom: 20px; }
        .btn { display: inline-block; padding: 16px 40px; font-weight: bold; background-color: var(--honey-yellow); color: var(--white); text-decoration: none; border-radius: 30px; }
    </style>
</head>
<body>

    <div id="loader">
        <div class="loader-content">
             <img id="loading-logo" src="https://dxtcuekuplihhijepqww.supabase.co/storage/v1/object/public/Assets/20260627_000257.png" alt="ChuBee Logo">
             <div class="progress-container"><div class="progress-bar"></div></div>
             <p class="loader-quote">You deserve a space that celebrates you</p>
        </div>
    </div>

    <div id="main-content">
        <header>
            <img class="nav-logo" src="https://dxtcuekuplihhijepqww.supabase.co/storage/v1/object/public/Assets/20260627_000257.png" alt="Logo">
            <div class="menu-icon" onclick="toggleMenu()">☰</div>
            <nav>
                <ul>
                    <li><a href="#">Home</a></li>
                    <li><a href="#">About</a></li>
                    <li><a href="#">How this work?</a></li>
                </ul>
            </nav>
        </header>

        <div id="side-nav">
            <ul>
                <li><a href="#">Home</a></li>
                <li><a href="#">About</a></li>
                <li><a href="#">How this work?</a></li>
            </ul>
        </div>

        <main>
            <h2>Welcome to the Hive of Acceptance</h2>
            <p>The ultimate platform for the plus-size community.</p>
            <a href="#" class="btn">Find Your Swarm</a>
        </main>
    </div>

    <script>
        function toggleMenu() {
            const nav = document.getElementById('side-nav');
            nav.style.right = nav.style.right === '0px' ? '-250px' : '0px';
        }
        window.addEventListener('load', () => {
            setTimeout(() => {
                const loader = document.getElementById('loader');
                loader.classList.add('hidden');
                document.body.classList.add('loaded');
                setTimeout(() => { loader.style.display = 'none'; }, 800);
            }, 5000); 
        });
    </script>
</body>
</html>
