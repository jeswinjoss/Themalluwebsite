<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TheMallu | Movie Reviews</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        :root {
            --bg-dark: #0a0a0a;
            --bg-card: #1a1a1a;
            --accent-red: #e50914;
            --text-main: #f5f5f5;
            --text-muted: #aaaaaa;
            --nav-height: 70px;
            --star-color: #f5c518;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            line-height: 1.6;
            overflow-x: hidden;
        }

        h1, h2, h3, .logo { font-family: 'Bebas Neue', cursive; letter-spacing: 1px; }

        /* --- PROFESSIONAL LOADING SCREEN --- */
        #loader {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-dark);
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            z-index: 9999;
            transition: opacity 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .loader-icons { display: flex; gap: 30px; margin-bottom: 30px; }
        .loader-icons svg { width: 50px; height: 50px; stroke: var(--text-muted); fill: none; stroke-width: 1.5; stroke-linecap: round; stroke-linejoin: round; }
        .floating { animation: floatIcon 2.5s ease-in-out infinite; opacity: 0; }
        .delay-1 { animation-delay: 0.4s; }
        .delay-2 { animation-delay: 0.8s; }

        @keyframes floatIcon {
            0% { transform: translateY(10px); opacity: 0; }
            20% { opacity: 1; }
            50% { transform: translateY(-15px); stroke: var(--accent-red); }
            80% { opacity: 1; }
            100% { transform: translateY(10px); opacity: 0; }
        }

        .loader-bar { width: 180px; height: 2px; background: #222; border-radius: 4px; overflow: hidden; position: relative; }
        .loader-progress { width: 60px; height: 100%; background: var(--accent-red); position: absolute; animation: slideProgress 1.5s infinite ease-in-out; }
        @keyframes slideProgress { 0% { left: -60px; } 100% { left: 180px; } }
        .loader-text { margin-top: 20px; font-family: 'Inter', sans-serif; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 4px; color: var(--text-muted); font-weight: 400; }

        /* --- NAVBAR & SEARCH --- */
        .navbar {
            display: flex; justify-content: space-between; align-items: center;
            padding: 0 5%; height: var(--nav-height);
            background-color: rgba(10, 10, 10, 0.95);
            border-bottom: 1px solid #222; position: sticky; top: 0; z-index: 1000;
        }
        .logo { font-size: 1.8rem; color: var(--text-main); text-decoration: none; z-index: 1001;}
        .logo span { color: var(--accent-red); }

        .nav-right { display: flex; align-items: center; gap: 1.5rem; }
        .search-container { position: relative; display: flex; align-items: center; }
        .search-input { width: 0; opacity: 0; transition: 0.4s ease; background: #111; border: 1px solid #333; color: white; padding: 5px 10px; border-radius: 4px; outline: none; }
        .search-input.active { width: 180px; opacity: 1; margin-right: 10px; }
        .search-btn { cursor: pointer; color: var(--text-main); }

        .nav-links { display: flex; gap: 2rem; align-items: center; list-style: none; }
        .nav-links a { color: var(--text-main); text-decoration: none; font-weight: 600; transition: 0.3s; }
        .nav-links a:hover { color: var(--accent-red); }
        .btn-login { background: var(--accent-red); padding: 0.5rem 1.2rem; border-radius: 4px; }

        .menu-toggle { display: none; cursor: pointer; flex-direction: column; gap: 5px; z-index: 1001; }
        .menu-toggle span { width: 25px; height: 3px; background: white; transition: 0.3s; }

        /* --- HOME CAROUSEL & GRID --- */
        .carousel-container { width: 100%; overflow: hidden; border-radius: 12px; margin-bottom: 2rem; position: relative; }
        .carousel-wrapper { display: flex; width: 100%; transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1); }
        .carousel-item { flex: 0 0 100%; height: 400px; background-size: cover; background-position: center; position: relative; display: flex; align-items: flex-end; padding: 2rem; }
        .carousel-overlay { background: linear-gradient(to top, rgba(0,0,0,0.9), transparent); position: absolute; top: 0; left: 0; right: 0; bottom: 0; }
        .carousel-content { position: relative; z-index: 2; }
        .carousel-content h2 { font-size: 3rem; margin-bottom: 0.5rem; }

        .container { display: flex; gap: 2rem; padding: 2rem 5%; max-width: 1400px; margin: auto; }
        .content { flex: 3; }
        .sidebar { flex: 1; }
        .section-title { font-size: 1.8rem; margin-bottom: 1.2rem; border-left: 4px solid var(--accent-red); padding-left: 10px; }
        
        .movie-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 1.5rem; }
        .movie-card { background: var(--bg-card); border-radius: 8px; overflow: hidden; text-decoration: none; color: inherit; transition: 0.3s; }
        .movie-card:hover { transform: translateY(-5px); }
        .movie-card img { width: 100%; height: 300px; object-fit: cover; }
        .card-info { padding: 1rem; }
        .score-badge { color: var(--star-color); font-weight: bold; }
        .view-more-container { text-align: center; margin-top: 2.5rem; }

        .btn-primary { background: var(--text-main); color: var(--bg-dark); border: none; padding: 0.7rem 1.8rem; font-weight: bold; border-radius: 4px; text-decoration: none; display: inline-block; cursor: pointer; transition: 0.2s;}
        .btn-primary:hover { background: var(--accent-red); color: white; }

        .hidden { display: none !important; }

        /* --- DEDICATED SINGLE MOVIE PAGE STYLES --- */
        .movie-page-hero { display: flex; gap: 2.5rem; margin-bottom: 3rem; background: var(--bg-card); padding: 2rem; border-radius: 12px; }
        .movie-poster { width: 300px; border-radius: 8px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); object-fit: cover; }
        .movie-info { flex: 1; display: flex; flex-direction: column; justify-content: center; }
        .movie-info h1 { font-size: 3.5rem; line-height: 1.1; margin-bottom: 0.5rem; }
        .score-container { display: flex; gap: 2rem; margin-bottom: 1.5rem; }
        .score-box h4 { font-size: 0.8rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; }
        .score-value { font-size: 1.5rem; color: var(--star-color); font-weight: bold; }
        
        .meta-tags { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 1.5rem; }
        .meta-tag { background: #222; padding: 0.4rem 0.8rem; border-radius: 4px; font-size: 0.9rem; font-weight: 600; display: flex; align-items: center; gap: 5px;}
        .ott-tag { border: 1px solid var(--accent-red); color: var(--text-main); }
        
        .section-box { background: var(--bg-card); padding: 2rem; border-radius: 12px; margin-bottom: 2rem; }
        .section-box p { color: #ccc; font-size: 1.1rem; line-height: 1.8; }

        /* Star Rating Form UI */
        .review-form { margin-top: 1rem; }
        .star-rating { display: flex; flex-direction: row-reverse; justify-content: flex-end; gap: 10px; margin-bottom: 1rem; }
        .star-rating input { display: none; }
        .star-rating label { font-size: 2.5rem; color: #444; cursor: pointer; transition: color 0.2s; }
        .star-rating input:checked ~ label,
        .star-rating label:hover,
        .star-rating label:hover ~ label { color: var(--star-color); }

        .review-input { width: 100%; height: 120px; background: #111; border: 1px solid #333; color: white; padding: 1rem; border-radius: 8px; font-family: 'Inter', sans-serif; resize: none; margin-bottom: 1rem; }
        .review-input:focus { outline: 1px solid var(--accent-red); }

        /* Displayed Review Box */
        .user-review-box { background: #111; border: 1px solid #333; padding: 1.5rem; border-radius: 8px; margin-bottom: 1rem; }
        .user-review-box .stars { color: var(--star-color); font-size: 1.2rem; margin-bottom: 0.5rem; }

        /* --- FORCED LOGIN POPUP --- */
        .auth-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.95); backdrop-filter: blur(8px);
            display: flex; justify-content: center; align-items: center;
            z-index: 10000; opacity: 0; pointer-events: none; transition: opacity 0.5s ease;
        }
        .auth-overlay.active { opacity: 1; pointer-events: all; }
        .auth-modal {
            background: var(--bg-card); padding: 3rem; border-radius: 12px;
            text-align: center; border-top: 4px solid var(--accent-red);
            max-width: 400px; width: 90%; box-shadow: 0 20px 50px rgba(0,0,0,0.8);
        }
        .btn-google {
            display: flex; align-items: center; justify-content: center; gap: 10px;
            width: 100%; background: white; color: #333; border: none; padding: 0.8rem;
            border-radius: 4px; font-weight: 600; font-size: 1rem; cursor: pointer; transition: 0.2s; margin-top: 1.5rem;
        }
        .btn-google:hover { background: #eee; }
        .btn-google img { width: 20px; }

        @media (max-width: 900px) { 
            .container { flex-direction: column; } 
            .nav-links { position: fixed; top: 0; right: -100%; width: 70%; height: 100vh; background: #111; flex-direction: column; justify-content: center; transition: 0.4s; }
            .nav-links.active { right: 0; }
            .menu-toggle { display: flex; }
            .movie-page-hero { flex-direction: column; align-items: center; text-align: center; }
            .movie-poster { width: 100%; max-width: 350px; }
            .meta-tags, .score-container { justify-content: center; }
        }
    </style>
</head>
<body>

    <div id="loader">
        <div class="loader-icons">
            <svg class="floating" viewBox="0 0 24 24"><rect x="2" y="2" width="20" height="20" rx="2.18" ry="2.18"></rect><line x1="7" y1="2" x2="7" y2="22"></line><line x1="17" y1="2" x2="17" y2="22"></line><line x1="2" y1="12" x2="22" y2="12"></line><line x1="2" y1="7" x2="7" y2="7"></line><line x1="2" y1="17" x2="7" y2="17"></line><line x1="17" y1="17" x2="22" y2="17"></line><line x1="17" y1="7" x2="22" y2="7"></line></svg>
            <svg class="floating delay-1" viewBox="0 0 24 24"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"></path><circle cx="12" cy="13" r="4"></circle></svg>
            <svg class="floating delay-2" viewBox="0 0 24 24"><path d="M2 9a3 3 0 0 1 0 6v2a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-2a3 3 0 0 1 0-6V7a2 2 0 0 0-2-2H4a2 2 0 0 0-2 2Z"></path><path d="M13 5v2"></path><path d="M13 17v2"></path><path d="M13 11v2"></path></svg>
        </div>
        <div class="loader-bar"><div class="loader-progress"></div></div>
        <div class="loader-text">Loading the experience</div>
    </div>

    <div id="forced-login-overlay" class="auth-overlay">
        <div class="auth-modal">
            <h2 style="font-family: 'Bebas Neue'; font-size: 2.5rem; margin-bottom: 0.5rem;">Access Restricted</h2>
            <p style="color: var(--text-muted); font-size: 0.95rem;">You must be signed in to view our exclusive cinematic content and reviews.</p>
            <button class="btn-google" id="google-login-btn">
                <img src="https://upload.wikimedia.org/wikipedia/commons/c/c1/Google_%22G%22_logo.svg" alt="Google Logo">
                Continue with Google
            </button>
        </div>
    </div>

    <header class="navbar">
        <a href="index.html" class="logo">THE<span>MALLU</span></a>
        
        <div class="nav-right">
            <div class="search-container">
                <input type="text" id="search-input" class="search-input" placeholder="Search movies...">
                <div class="search-btn" id="search-trigger">
                    <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                </div>
            </div>
            <div class="menu-toggle" id="mobile-menu"><span></span><span></span><span></span></div>
            <ul class="nav-links" id="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="reviews.html">Reviews</a></li>
                <li><a href="#" class="btn-login" id="nav-login-btn">Login</a></li>
            </ul>
        </div>
    </header>

    <main class="container">
        <div id="home-view" class="content">
            <div class="carousel-container"><div class="carousel-wrapper" id="hero-carousel"></div></div>
            <h3 class="section-title">Recent Reviews</h3>
            <section class="movie-grid" id="movie-grid"></section>
            <div class="view-more-container"><a href="reviews.html" class="btn-primary">View More Reviews</a></div>
        </div>

        <div id="movie-view" class="content hidden" style="flex: 1; max-width: 1000px; margin: 0 auto;">
            <div id="movie-detail-container"></div>
        </div>

        <aside class="sidebar" id="sidebar-section">
            <div style="background: var(--bg-card); padding: 1.5rem; border-radius: 8px; border-bottom: 4px solid var(--accent-red);">
                <h3 style="font-family: 'Bebas Neue'; letter-spacing: 1.5px; margin-bottom: 0.5rem;">Join the Community</h3>
                <p style="font-size: 0.9rem; color: var(--text-muted);">Sign up to write your own reviews and track your favorite films.</p>
                <button class="btn-primary" style="width: 100%; margin-top: 1rem; font-size: 0.8rem;">Join Now</button>
            </div>
        </aside>
    </main>

    <script>
        const supabaseUrl = 'https://bmtoevcfrimhwamyqbvc.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJtdG9ldmNmcmltaHdhbXlxYnZjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc1NTg0NzMsImV4cCI6MjA5MzEzNDQ3M30.pqVOFqFX3PWA003vHmINfnFY7yoWAX7W_V15xNRawiE';
        
        const dummyMovies = [
            { id: 1, slug: 'dune-part-two', title: 'Dune: Part Two', score: '9.5', image: 'https://image.tmdb.org/t/p/original/8rpDcsfLJypbO6vtec8OobKXpqc.jpg', releaseDate: 'Mar 01, 2026', ott: 'Max', description: 'Paul Atreides unites with Chani and the Fremen while on a warpath of revenge against the conspirators who destroyed his family.' },
            { id: 2, slug: 'challengers', title: 'Challengers', score: '8.0', image: 'https://image.tmdb.org/t/p/original/8b8R8l88ILjqZWugPhM5O22t08T.jpg', releaseDate: 'Apr 26, 2026', ott: 'Prime Video', description: 'Tashi, a former tennis prodigy turned coach, transformed her husband into a champion. But to overcome a losing streak, he must face his former best friend.' }
        ];

        // UI Interactions
        const menuBtn = document.getElementById('mobile-menu');
        const navLinks = document.getElementById('nav-links');
        const searchTrigger = document.getElementById('search-trigger');
        const searchInput = document.getElementById('search-input');

        menuBtn.addEventListener('click', () => navLinks.classList.toggle('active'));

        searchTrigger.addEventListener('click', () => {
            if (searchInput.classList.contains('active') && searchInput.value.trim() !== "") {
                window.location.href = `search.html?q=${encodeURIComponent(searchInput.value)}`;
            } else {
                searchInput.classList.toggle('active');
                if (searchInput.classList.contains('active')) searchInput.focus();
            }
        });

        searchInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && searchInput.value.trim() !== "") {
                window.location.href = `search.html?q=${encodeURIComponent(searchInput.value)}`;
            }
        });

        async function start() {
            const urlParams = new URLSearchParams(window.location.search);
            const movieId = urlParams.get('id') || urlParams.get('movie'); 

            if (movieId) {
                document.getElementById('loader').style.display = 'none';
                document.getElementById('home-view').classList.add('hidden');
                document.getElementById('sidebar-section').classList.add('hidden');
                document.getElementById('movie-view').classList.remove('hidden');
                renderSingle(movieId);
            } else {
                let movies = dummyMovies;
                try {
                    if (window.supabase) {
                        const client = window.supabase.createClient(supabaseUrl, supabaseKey);
                        const { data } = await client.from('movies').select('*').limit(10);
                        if (data && data.length > 0) movies = data;
                    }
                } catch (e) { console.log("Falling back to dummy data"); }
                
                renderHome(movies);
                initCarousel();
                
                window.requestAnimationFrame(() => {
                    setTimeout(() => {
                        const loader = document.getElementById('loader');
                        loader.style.opacity = '0';
                        setTimeout(() => loader.style.display = 'none', 600);
                    }, 800);
                });
            }
        }

        function renderHome(movies) {
            const carousel = document.getElementById('hero-carousel');
            const grid = document.getElementById('movie-grid');
            carousel.innerHTML = ''; grid.innerHTML = '';

            movies.forEach((movie, index) => {
                const link = `?movie=${movie.slug || movie.id}`;
                carousel.innerHTML += `
                    <div class="carousel-item" style="background-image: url('${movie.image}')">
                        <div class="carousel-overlay"></div>
                        <div class="carousel-content">
                            <h2>${movie.title}</h2>
                            <a href="${link}" class="btn-primary">View Review</a>
                        </div>
                    </div>`;
                
                if (index < 3) { 
                    grid.innerHTML += `
                        <a href="${link}" class="movie-card">
                            <img src="${movie.image}" alt="Poster">
                            <div class="card-info">
                                <h4>${movie.title}</h4>
                                <span class="score-badge">⭐ ${movie.score}</span>
                            </div>
                        </a>`;
                }
            });
        }

        function initCarousel() {
            const wrapper = document.getElementById('hero-carousel');
            const items = document.querySelectorAll('.carousel-item');
            let index = 0;
            if(items.length > 1) {
                setInterval(() => {
                    index++;
                    if (index >= items.length) index = 0;
                    wrapper.style.transform = `translateX(-${index * 100}%)`;
                }, 4000);
            }
        }

        // --- FETCH SINGLE MOVIE & CALCULATE REVIEWS ---
        async function renderSingle(idOrSlug) {
            let movie = dummyMovies.find(m => m.id == idOrSlug || m.slug === idOrSlug);
            let communityScore = 'No Ratings';
            let reviewsHTML = '<p style="color: var(--text-muted);">No community reviews yet. Be the first to share your thoughts!</p>';

            try {
                if (window.supabase) {
                    const client = window.supabase.createClient(supabaseUrl, supabaseKey);
                    const column = isNaN(idOrSlug) ? 'slug' : 'id';
                    
                    // 1. Fetch Movie Info
                    const { data: movieData } = await client.from('movies').select('*').eq(column, idOrSlug).single();
                    if (movieData) movie = movieData;

                    // 2. Fetch User Reviews for this Movie
                    if (movie) {
                        const { data: reviewsData } = await client.from('user_reviews').select('rating, comment').eq('movie_id', movie.id);
                        
                        if (reviewsData && reviewsData.length > 0) {
                            // Calculate Average Algorithm
                            const totalSum = reviewsData.reduce((acc, curr) => acc + curr.rating, 0);
                            const average = (totalSum / reviewsData.length).toFixed(1);
                            communityScore = `⭐ ${average} <span style="font-size:1rem; color:#888; font-weight:normal;">(${reviewsData.length} votes)</span>`;

                            // Generate Review Blocks
                            reviewsHTML = reviewsData.map(r => `
                                <div class="user-review-box">
                                    <div class="stars">${'★'.repeat(r.rating)}${'☆'.repeat(5 - r.rating)}</div>
                                    <p style="color: #ddd; font-size: 0.95rem;">"${r.comment}"</p>
                                </div>
                            `).join('');
                        }
                    }
                }
            } catch(e) { console.error(e); }

            if (movie) {
                document.title = `${movie.title} - TheMallu Reviews`;

                const releaseDate = movie.releaseDate || movie.release_date || 'Unknown';
                const ottPlatform = movie.ott || movie.ott_platform || 'Theaters';
                const summary = movie.description || movie.review || 'No summary available.';

                document.getElementById('movie-detail-container').innerHTML = `
                    <div class="movie-page-hero">
                        <img src="${movie.image}" alt="${movie.title} Poster" class="movie-poster">
                        <div class="movie-info">
                            <h1>${movie.title}</h1>
                            
                            <div class="score-container">
                                <div class="score-box">
                                    <h4>Critic Score</h4>
                                    <div class="score-value">⭐ ${movie.score}</div>
                                </div>
                                <div class="score-box" style="border-left: 1px solid #333; padding-left: 2rem;">
                                    <h4>Community Score</h4>
                                    <div class="score-value">${communityScore}</div>
                                </div>
                            </div>
                            
                            <div class="meta-tags">
                                <span class="meta-tag">📅 ${releaseDate}</span>
                                <span class="meta-tag ott-tag">📺 Watch on: ${ottPlatform}</span>
                            </div>
                        </div>
                    </div>

                    <div class="section-box">
                        <h3 class="section-title">Storyline</h3>
                        <p>${summary}</p>
                    </div>

                    <div class="section-box">
                        <h3 class="section-title">Leave Your Review</h3>
                        <p style="margin-bottom: 1rem; font-size: 0.9rem;">Have you seen it? Rate the movie and share your thoughts below.</p>
                        
                        <form class="review-form" onsubmit="submitReview(event)">
                            <input type="hidden" name="movie_id" value="${movie.id}">
                            <div class="star-rating">
                                <input type="radio" id="star5" name="rating" value="5"><label for="star5" title="5 stars">★</label>
                                <input type="radio" id="star4" name="rating" value="4"><label for="star4" title="4 stars">★</label>
                                <input type="radio" id="star3" name="rating" value="3"><label for="star3" title="3 stars">★</label>
                                <input type="radio" id="star2" name="rating" value="2"><label for="star2" title="2 stars">★</label>
                                <input type="radio" id="star1" name="rating" value="1"><label for="star1" title="1 star">★</label>
                            </div>
                            <textarea name="comment" class="review-input" placeholder="Write your comment here..." required></textarea>
                            <button type="submit" class="btn-primary" id="submit-btn">Post Review</button>
                        </form>
                    </div>

                    <div class="section-box">
                        <h3 class="section-title">Community Reviews</h3>
                        <div id="reviews-list">
                            ${reviewsHTML}
                        </div>
                    </div>
                    
                    <div style="text-align: center;">
                        <a href="index.html" style="color:var(--text-muted); text-decoration:none; margin-bottom:3rem; display:inline-block;">← Back to Home</a>
                    </div>
                `;
            }
        }

        // --- ACTUAL SUPABASE SUBMIT LOGIC ---
        async function submitReview(event) {
            event.preventDefault(); 
            const form = event.target;
            const ratingInput = form.querySelector('input[name="rating"]:checked');
            const commentInput = form.querySelector('textarea[name="comment"]').value;
            const movieId = form.querySelector('input[name="movie_id"]').value;
            const submitBtn = form.querySelector('#submit-btn');
            
            if (!ratingInput) {
                alert("Please select a star rating before submitting!");
                return;
            }

            if (!window.supabase) {
                alert("Database connection is not available right now.");
                return;
            }

            submitBtn.innerText = "Posting...";
            submitBtn.disabled = true;

            const client = window.supabase.createClient(supabaseUrl, supabaseKey);
            const { data: { session } } = await client.auth.getSession();
            
            const reviewData = {
                movie_id: movieId,
                rating: parseInt(ratingInput.value),
                comment: commentInput
            };

            if (session) { reviewData.user_id = session.user.id; }

            const { error } = await client.from('user_reviews').insert([reviewData]);

            if (error) {
                console.error("Error saving review:", error);
                alert("Failed to save review: " + error.message);
                submitBtn.innerText = "Post Review";
                submitBtn.disabled = false;
            } else {
                alert("Thank you! Your review has been posted.");
                window.location.reload(); // Reload to show the new review and updated average!
            }
        }

        // --- AUTH & POPUP LOGIC ---
        async function checkAuthAndLock() {
            if (window.supabase) {
                const client = window.supabase.createClient(supabaseUrl, supabaseKey);
                const { data: { session } } = await client.auth.getSession();
                
                if (!session) {
                    setTimeout(() => {
                        document.getElementById('forced-login-overlay').classList.add('active');
                        document.body.style.overflow = 'hidden'; 
                    }, 4000);
                } else {
                    const navLoginBtn = document.getElementById('nav-login-btn');
                    if (navLoginBtn) {
                        navLoginBtn.innerText = "Logout";
                        navLoginBtn.href = "#";
                        navLoginBtn.addEventListener('click', async (e) => {
                            e.preventDefault();
                            await client.auth.signOut();
                            window.location.reload(); 
                        });
                    }
                }

                const googleBtn = document.getElementById('google-login-btn');
                if (googleBtn) {
                    googleBtn.addEventListener('click', async () => {
                        const { error } = await client.auth.signInWithOAuth({
                            provider: 'google',
                            options: { redirectTo: window.location.origin + window.location.pathname }
                        });
                        if (error) alert("Login failed: " + error.message);
                    });
                }
            }
        }

        window.onload = async () => {
            await start();
            checkAuthAndLock();
        };

    </script>
</body>
</html>
