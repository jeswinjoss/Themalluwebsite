<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TheMallu | Reviews & Polls</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        :root {
            --bg-dark: #0a0a0a;
            --bg-card: #1a1a1a;
            --accent-red: #e50914;
            --text-main: #f5f5f5;
            --text-muted: #aaaaaa;
            --nav-height: 70px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            line-height: 1.6;
            overflow-x: hidden;
        }

        h1, h2, h3, .logo { font-family: 'Bebas Neue', cursive; letter-spacing: 1px; }

        /* Navbar & Menu */
        .navbar {
            display: flex; justify-content: space-between; align-items: center;
            padding: 0 5%; height: var(--nav-height);
            background-color: rgba(10, 10, 10, 0.95);
            border-bottom: 1px solid #222; position: sticky; top: 0; z-index: 1000;
        }
        .logo { font-size: 1.8rem; color: var(--text-main); text-decoration: none; z-index: 1001;}
        .logo span { color: var(--accent-red); }

        .nav-links { display: flex; gap: 2rem; align-items: center; list-style: none; }
        .nav-links a { color: var(--text-main); text-decoration: none; font-weight: 600; transition: 0.3s; }
        .nav-links a:hover { color: var(--accent-red); }
        .btn-login { background: var(--accent-red); padding: 0.5rem 1.2rem; border-radius: 4px; }

        /* Hamburger Icon */
        .menu-toggle { display: none; cursor: pointer; flex-direction: column; gap: 5px; z-index: 1001; }
        .menu-toggle span { width: 25px; height: 3px; background: white; transition: 0.3s; }

        /* Mobile Slider */
        @media (max-width: 768px) {
            .menu-toggle { display: flex; }
            .nav-links {
                position: fixed; top: 0; right: -100%; width: 70%; height: 100vh;
                background: #111; flex-direction: column; justify-content: center;
                transition: 0.4s; box-shadow: -5px 0 15px rgba(0,0,0,0.5);
            }
            .nav-links.active { right: 0; }
            .container { flex-direction: column; padding: 1rem 5%; }
        }

        /* Hero Carousel */
        .carousel-wrapper {
            display: flex; overflow-x: auto; scroll-snap-type: x mandatory;
            gap: 1rem; padding-bottom: 1rem; margin-bottom: 2rem;
            scrollbar-width: none;
        }
        .carousel-wrapper::-webkit-scrollbar { display: none; }
        
        .carousel-item {
            flex: 0 0 100%; height: 350px; scroll-snap-align: start;
            background-size: cover; background-position: center;
            border-radius: 12px; position: relative; display: flex;
            align-items: flex-end; padding: 1.5rem;
        }

        .carousel-overlay {
            background: linear-gradient(to top, rgba(0,0,0,0.9), transparent);
            position: absolute; top: 0; left: 0; right: 0; bottom: 0; border-radius: 12px;
        }

        .carousel-content { position: relative; z-index: 2; }
        .carousel-content h2 { font-size: 2.5rem; margin-bottom: 0.5rem; }

        /* Movie Grid */
        .section-title { font-size: 1.8rem; margin-bottom: 1.2rem; border-left: 4px solid var(--accent-red); padding-left: 10px; }
        .movie-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 1rem; }
        .movie-card { background: var(--bg-card); border-radius: 8px; overflow: hidden; text-decoration: none; color: inherit; }
        .movie-card img { width: 100%; height: 240px; object-fit: cover; }
        .card-info { padding: 0.8rem; }
        .score-badge { color: #f5c518; font-weight: bold; font-size: 0.9rem; }

        /* Buttons & Utils */
        .btn-primary {
            background: var(--text-main); color: var(--bg-dark); border: none;
            padding: 0.6rem 1.5rem; font-weight: bold; border-radius: 4px;
            text-decoration: none; display: inline-block;
        }
        .container { display: flex; gap: 2rem; padding: 2rem 5%; max-width: 1400px; margin: auto; }
        .content { flex: 3; }
        .sidebar { flex: 1; }
        .hidden { display: none !important; }

        /* Detail View */
        .movie-header { height: 300px; background-size: cover; background-position: center; border-radius: 12px; position: relative; display: flex; align-items: flex-end; padding: 1.5rem; margin-bottom: 1.5rem;}
        .movie-header-overlay { background: rgba(0,0,0,0.5); position: absolute; top:0; left:0; right:0; bottom:0; border-radius: 12px;}
    </style>
</head>
<body>

    <header class="navbar">
        <a href="index.html" class="logo">THE<span>MALLU</span></a>
        
        <div class="menu-toggle" id="mobile-menu">
            <span></span><span></span><span></span>
        </div>

        <ul class="nav-links" id="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="#">Reviews</a></li>
            <li><a href="#">Polls</a></li>
            <li><a href="#" class="btn-login">Login</a></li>
        </ul>
    </header>

    <main class="container">
        <div id="home-view" class="content">
            <div class="carousel-wrapper" id="hero-carousel">
                <p id="loading-text">Synchronizing movies...</p>
            </div>
            <h3 class="section-title">Recent Reviews</h3>
            <section class="movie-grid" id="movie-grid"></section>
        </div>

        <div id="movie-view" class="content hidden">
            <div id="movie-detail-container"></div>
        </div>

        <aside class="sidebar">
            <div style="background: var(--bg-card); padding: 1.5rem; border-radius: 8px; border-top: 4px solid var(--accent-red);">
                <h3>Weekly Poll</h3>
                <p style="font-size: 0.9rem; color: var(--text-muted); margin: 0.5rem 0;">Most anticipated release?</p>
                <button style="width: 100%; padding: 0.8rem; background: #222; color: white; border: 1px solid #444; margin-top: 0.5rem; border-radius: 4px; text-align: left;">Deadpool & Wolverine</button>
                <button style="width: 100%; padding: 0.8rem; background: #222; color: white; border: 1px solid #444; margin-top: 0.5rem; border-radius: 4px; text-align: left;">Alien: Romulus</button>
            </div>
        </aside>
    </main>

    <script>
        const supabaseUrl = 'https://bmtoevcfrimhwamyqbvc.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJtdG9ldmNmcmltaHdhbXlxYnZjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc1NTg0NzMsImV4cCI6MjA5MzEzNDQ3M30.pqVOFqFX3PWA003vHmINfnFY7yoWAX7W_V15xNRawiE';
        
        const dummyMovies = [
            { id: 1, title: 'Dune: Part Two', score: '9.5', image: 'https://image.tmdb.org/t/p/original/8rpDcsfLJypbO6vtec8OobKXpqc.jpg', description: 'Epic sci-fi masterpiece.' },
            { id: 2, title: 'Challengers', score: '8.0', image: 'https://image.tmdb.org/t/p/original/8b8R8l88ILjqZWugPhM5O22t08T.jpg', description: 'Intense sports drama.' }
        ];

        // Mobile Menu Logic
        const menuBtn = document.getElementById('mobile-menu');
        const navLinks = document.getElementById('nav-links');

        menuBtn.addEventListener('click', () => {
            navLinks.classList.toggle('active');
        });

        // Initialize Site
        async function start() {
            const urlParams = new URLSearchParams(window.location.search);
            const movieId = urlParams.get('id');

            if (movieId) {
                document.getElementById('home-view').classList.add('hidden');
                document.getElementById('movie-view').classList.remove('hidden');
                renderSingle(movieId);
            } else {
                let movies = dummyMovies;
                try {
                    // Safety: Wait for Supabase to be defined
                    if (window.supabase) {
                        const client = window.supabase.createClient(supabaseUrl, supabaseKey);
                        const { data } = await client.from('movies').select('*').limit(10);
                        if (data && data.length > 0) movies = data;
                    }
                } catch (e) { console.log("Falling back to local data"); }
                
                renderHome(movies);
            }
        }

        function renderHome(movies) {
            const carousel = document.getElementById('hero-carousel');
            const grid = document.getElementById('movie-grid');
            carousel.innerHTML = '';
            grid.innerHTML = '';

            movies.forEach(movie => {
                carousel.innerHTML += `
                    <div class="carousel-item" style="background-image: url('${movie.image}')">
                        <div class="carousel-overlay"></div>
                        <div class="carousel-content">
                            <h2>${movie.title}</h2>
                            <a href="?id=${movie.id}" class="btn-primary">View Review</a>
                        </div>
                    </div>`;
                grid.innerHTML += `
                    <a href="?id=${movie.id}" class="movie-card">
                        <img src="${movie.image}">
                        <div class="card-info">
                            <h4>${movie.title}</h4>
                            <span class="score-badge">⭐ ${movie.score}</span>
                        </div>
                    </a>`;
            });
        }

        async function renderSingle(id) {
            let movie = dummyMovies.find(m => m.id == id);
            try {
                if (window.supabase) {
                    const client = window.supabase.createClient(supabaseUrl, supabaseKey);
                    const { data } = await client.from('movies').select('*').eq('id', id).single();
                    if (data) movie = data;
                }
            } catch(e) {}

            if (movie) {
                document.getElementById('movie-detail-container').innerHTML = `
                    <div class="movie-header" style="background-image: url('${movie.image}')">
                        <div class="movie-header-overlay"></div>
                        <h1 style="position:relative; z-index:2; font-size:3rem;">${movie.title}</h1>
                    </div>
                    <div style="background: var(--bg-card); padding: 2rem; border-radius: 8px;">
                        <p>${movie.description}</p>
                        <br><a href="index.html" class="btn-primary">Back to Home</a>
                    </div>`;
            }
        }

        // Wait for library before starting
        window.onload = start;
    </script>
</body>
</html>
