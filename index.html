<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TheMallu | Reviews & Polls</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        :root {
            --bg-dark: #0a0a0a;
            --bg-card: #1a1a1a;
            --accent-red: #e50914;
            --text-main: #f5f5f5;
            --text-muted: #aaaaaa;
            --nav-height: 70px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            line-height: 1.6;
            overflow-x: hidden;
        }

        h1, h2, h3, .logo { font-family: 'Bebas Neue', cursive; letter-spacing: 1px; }

        /* --- LOADING SCREEN --- */
        #loader {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-dark);
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            z-index: 9999;
            transition: opacity 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .loader-icons {
            display: flex;
            gap: 30px;
            margin-bottom: 30px;
        }

        .loader-icons svg {
            width: 50px;
            height: 50px;
            stroke: var(--text-muted);
            fill: none;
            stroke-width: 1.5;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .floating {
            animation: floatIcon 2.5s ease-in-out infinite;
            opacity: 0;
        }

        .delay-1 { animation-delay: 0.4s; }
        .delay-2 { animation-delay: 0.8s; }

        @keyframes floatIcon {
            0% { transform: translateY(10px); opacity: 0; }
            20% { opacity: 1; }
            50% { transform: translateY(-15px); stroke: var(--accent-red); }
            80% { opacity: 1; }
            100% { transform: translateY(10px); opacity: 0; }
        }

        .loader-bar {
            width: 180px;
            height: 2px;
            background: #222;
            border-radius: 4px;
            overflow: hidden;
            position: relative;
        }

        .loader-progress {
            width: 60px;
            height: 100%;
            background: var(--accent-red);
            position: absolute;
            animation: slideProgress 1.5s infinite ease-in-out;
        }

        @keyframes slideProgress {
            0% { left: -60px; }
            100% { left: 180px; }
        }

        .loader-text {
            margin-top: 20px;
            font-family: 'Inter', sans-serif;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 4px;
            color: var(--text-muted);
            font-weight: 400;
        }

        /* --- NAVBAR & SEARCH --- */
        .navbar {
            display: flex; justify-content: space-between; align-items: center;
            padding: 0 5%; height: var(--nav-height);
            background-color: rgba(10, 10, 10, 0.95);
            border-bottom: 1px solid #222; position: sticky; top: 0; z-index: 1000;
        }
        .logo { font-size: 1.8rem; color: var(--text-main); text-decoration: none; z-index: 1001;}
        .logo span { color: var(--accent-red); }

        .nav-right { display: flex; align-items: center; gap: 1.5rem; }
        
        .search-container { position: relative; display: flex; align-items: center; }
        .search-input { 
            width: 0; opacity: 0; transition: 0.4s ease;
            background: #111; border: 1px solid #333; color: white;
            padding: 5px 10px; border-radius: 4px; outline: none;
        }
        .search-input.active { width: 180px; opacity: 1; margin-right: 10px; }
        .search-btn { cursor: pointer; color: var(--text-main); }

        .nav-links { display: flex; gap: 2rem; align-items: center; list-style: none; }
        .nav-links a { color: var(--text-main); text-decoration: none; font-weight: 600; transition: 0.3s; }
        .nav-links a:hover { color: var(--accent-red); }
        .btn-login { background: var(--accent-red); padding: 0.5rem 1.2rem; border-radius: 4px; }

        .menu-toggle { display: none; cursor: pointer; flex-direction: column; gap: 5px; z-index: 1001; }
        .menu-toggle span { width: 25px; height: 3px; background: white; transition: 0.3s; }

        @media (max-width: 900px) {
            .nav-links {
                position: fixed; top: 0; right: -100%; width: 70%; height: 100vh;
                background: #111; flex-direction: column; justify-content: center;
                transition: 0.4s; box-shadow: -5px 0 15px rgba(0,0,0,0.5);
            }
            .nav-links.active { right: 0; }
            .menu-toggle { display: flex; }
        }

        /* --- CAROUSEL & GRID --- */
        .carousel-container {
            width: 100%;
            overflow: hidden;
            border-radius: 12px;
            margin-bottom: 2rem;
            position: relative;
        }

        .carousel-wrapper {
            display: flex;
            width: 100%;
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .carousel-item {
            flex: 0 0 100%; height: 400px;
            background-size: cover; background-position: center;
            position: relative; display: flex;
            align-items: flex-end; padding: 2rem;
        }

        .carousel-overlay {
            background: linear-gradient(to top, rgba(0,0,0,0.9), transparent);
            position: absolute; top: 0; left: 0; right: 0; bottom: 0;
        }

        .carousel-content { position: relative; z-index: 2; }
        .carousel-content h2 { font-size: 3rem; margin-bottom: 0.5rem; }

        .container { display: flex; gap: 2rem; padding: 2rem 5%; max-width: 1400px; margin: auto; }
        .content { flex: 3; }
        .sidebar { flex: 1; }
        .section-title { font-size: 1.8rem; margin-bottom: 1.2rem; border-left: 4px solid var(--accent-red); padding-left: 10px; }
        
        .movie-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 1.5rem; }
        .movie-card { background: var(--bg-card); border-radius: 8px; overflow: hidden; text-decoration: none; color: inherit; transition: 0.3s; }
        .movie-card:hover { transform: translateY(-5px); }
        .movie-card img { width: 100%; height: 300px; object-fit: cover; }
        .card-info { padding: 1rem; }
        .score-badge { color: #f5c518; font-weight: bold; }

        .view-more-container { text-align: center; margin-top: 2.5rem; }

        .btn-primary {
            background: var(--text-main); color: var(--bg-dark); border: none;
            padding: 0.7rem 1.8rem; font-weight: bold; border-radius: 4px;
            text-decoration: none; display: inline-block; cursor: pointer;
        }

        .hidden { display: none !important; }

        /* Detail View */
        .movie-header { height: 400px; background-size: cover; background-position: center; border-radius: 12px; position: relative; display: flex; align-items: flex-end; padding: 2rem; margin-bottom: 2rem;}
        .movie-header-overlay { background: rgba(0,0,0,0.5); position: absolute; top:0; left:0; right:0; bottom:0; border-radius: 12px;}

        @media (max-width: 900px) { .container { flex-direction: column; } }
    </style>
</head>
<body>

    <div id="loader">
        <div class="loader-icons">
            <svg class="floating" viewBox="0 0 24 24"><rect x="2" y="2" width="20" height="20" rx="2.18" ry="2.18"></rect><line x1="7" y1="2" x2="7" y2="22"></line><line x1="17" y1="2" x2="17" y2="22"></line><line x1="2" y1="12" x2="22" y2="12"></line><line x1="2" y1="7" x2="7" y2="7"></line><line x1="2" y1="17" x2="7" y2="17"></line><line x1="17" y1="17" x2="22" y2="17"></line><line x1="17" y1="7" x2="22" y2="7"></line></svg>
            <svg class="floating delay-1" viewBox="0 0 24 24"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"></path><circle cx="12" cy="13" r="4"></circle></svg>
            <svg class="floating delay-2" viewBox="0 0 24 24"><path d="M2 9a3 3 0 0 1 0 6v2a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-2a3 3 0 0 1 0-6V7a2 2 0 0 0-2-2H4a2 2 0 0 0-2 2Z"></path><path d="M13 5v2"></path><path d="M13 17v2"></path><path d="M13 11v2"></path></svg>
        </div>
        <div class="loader-bar"><div class="loader-progress"></div></div>
        <div class="loader-text">Loading the experience</div>
    </div>

    <header class="navbar">
        <a href="index.html" class="logo">THE<span>MALLU</span></a>
        
        <div class="nav-right">
            <div class="search-container">
                <input type="text" id="search-input" class="search-input" placeholder="Search movies...">
                <div class="search-btn" id="search-trigger">
                    <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                </div>
            </div>

            <div class="menu-toggle" id="mobile-menu"><span></span><span></span><span></span></div>

            <ul class="nav-links" id="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="reviews.html">Reviews</a></li>
                <li><a href="#">Polls</a></li>
                <li><a href="#" class="btn-login">Login</a></li>
            </ul>
        </div>
    </header>

    <main class="container">
        <div id="home-view" class="content">
            <div class="carousel-container">
                <div class="carousel-wrapper" id="hero-carousel"></div>
            </div>
            
            <h3 class="section-title">Recent Reviews</h3>
            <section class="movie-grid" id="movie-grid"></section>
            
            <div class="view-more-container">
                <a href="reviews.html" class="btn-primary">View More Reviews</a>
            </div>
        </div>

        <div id="movie-view" class="content hidden">
            <div id="movie-detail-container"></div>
        </div>

        <aside class="sidebar">
            <div style="background: var(--bg-card); padding: 1.5rem; border-radius: 8px; border-bottom: 4px solid var(--accent-red);">
                <h3 style="font-family: 'Bebas Neue'; letter-spacing: 1.5px; margin-bottom: 0.5rem;">Join the Community</h3>
                <p style="font-size: 0.9rem; color: var(--text-muted);">Sign up to write your own reviews and track your favorite films.</p>
                <button class="btn-primary" style="width: 100%; margin-top: 1rem; font-size: 0.8rem;">Join Now</button>
            </div>
        </aside>
    </main>

    <script>
        const supabaseUrl = 'https://bmtoevcfrimhwamyqbvc.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJtdG9ldmNmcmltaHdhbXlxYnZjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc1NTg0NzMsImV4cCI6MjA5MzEzNDQ3M30.pqVOFqFX3PWA003vHmINfnFY7yoWAX7W_V15xNRawiE';
        
        const dummyMovies = [
            { id: 1, title: 'Dune: Part Two', score: '9.5', image: 'https://image.tmdb.org/t/p/original/8rpDcsfLJypbO6vtec8OobKXpqc.jpg', description: 'Epic sci-fi masterpiece.' },
            { id: 2, title: 'Challengers', score: '8.0', image: 'https://image.tmdb.org/t/p/original/8b8R8l88ILjqZWugPhM5O22t08T.jpg', description: 'Intense sports drama.' },
            { id: 3, title: 'Furiosa', score: '8.5', image: 'https://image.tmdb.org/t/p/original/fdZpvZcgvSqBramIWEz0hT1m5Lw.jpg', description: 'A Mad Max Saga.' }
        ];

        // UI Interactions
        const menuBtn = document.getElementById('mobile-menu');
        const navLinks = document.getElementById('nav-links');
        const searchTrigger = document.getElementById('search-trigger');
        const searchInput = document.getElementById('search-input');

        menuBtn.addEventListener('click', () => navLinks.classList.toggle('active'));

        searchTrigger.addEventListener('click', () => {
            if (searchInput.classList.contains('active') && searchInput.value.trim() !== "") {
                performSearch(searchInput.value);
            } else {
                searchInput.classList.toggle('active');
                if (searchInput.classList.contains('active')) searchInput.focus();
            }
        });

        searchInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') performSearch(searchInput.value);
        });

        async function performSearch(query) {
            if (!query.trim()) return;
            // Redirect to a search results logic or just filter current view
            console.log("Searching for:", query);
            const client = window.supabase.createClient(supabaseUrl, supabaseKey);
            const { data, error } = await client.from('movies').select('*').ilike('title', `%${query}%`);
            if (!error && data.length > 0) {
                renderHome(data); // Display results in the grid
            }
        }

        async function start() {
            const urlParams = new URLSearchParams(window.location.search);
            const movieId = urlParams.get('id');

            if (movieId) {
                document.getElementById('loader').style.display = 'none';
                document.getElementById('home-view').classList.add('hidden');
                document.getElementById('movie-view').classList.remove('hidden');
                renderSingle(movieId);
            } else {
                let movies = dummyMovies;
                try {
                    if (window.supabase) {
                        const client = window.supabase.createClient(supabaseUrl, supabaseKey);
                        const { data } = await client.from('movies').select('*').limit(10);
                        if (data && data.length > 0) movies = data;
                    }
                } catch (e) { console.log("Falling back"); }
                
                renderHome(movies);
                initCarousel();
                
                window.requestAnimationFrame(() => {
                    setTimeout(() => {
                        const loader = document.getElementById('loader');
                        loader.style.opacity = '0';
                        setTimeout(() => loader.style.display = 'none', 600);
                    }, 1200);
                });
            }
        }

        function renderHome(movies) {
            const carousel = document.getElementById('hero-carousel');
            const grid = document.getElementById('movie-grid');
            
            carousel.innerHTML = '';
            grid.innerHTML = '';

            // Render all for carousel, but only first 3 for the grid
            movies.forEach((movie, index) => {
                carousel.innerHTML += `
                    <div class="carousel-item" style="background-image: url('${movie.image}')">
                        <div class="carousel-overlay"></div>
                        <div class="carousel-content">
                            <h2>${movie.title}</h2>
                            <a href="?id=${movie.id}" class="btn-primary">View Review</a>
                        </div>
                    </div>`;
                
                if (index < 3) { // LIMIT TO 3 CARDS
                    grid.innerHTML += `
                        <a href="?id=${movie.id}" class="movie-card">
                            <img src="${movie.image}">
                            <div class="card-info">
                                <h4>${movie.title}</h4>
                                <span class="score-badge">⭐ ${movie.score}</span>
                            </div>
                        </a>`;
                }
            });
        }

        function initCarousel() {
            const wrapper = document.getElementById('hero-carousel');
            const items = document.querySelectorAll('.carousel-item');
            let index = 0;
            if(items.length > 1) {
                setInterval(() => {
                    index++;
                    if (index >= items.length) index = 0;
                    wrapper.style.transform = `translateX(-${index * 100}%)`;
                }, 3000);
            }
        }

        async function renderSingle(id) {
            let movie = dummyMovies.find(m => m.id == id);
            try {
                if (window.supabase) {
                    const client = window.supabase.createClient(supabaseUrl, supabaseKey);
                    const { data } = await client.from('movies').select('*').eq('id', id).single();
                    if (data) movie = data;
                }
            } catch(e) {}

            if (movie) {
                document.getElementById('movie-detail-container').innerHTML = `
                    <div class="movie-header" style="background-image: url('${movie.image}')">
                        <div class="movie-header-overlay"></div>
                        <h1 style="position:relative; z-index:2; font-size:3rem;">${movie.title}</h1>
                    </div>
                    <div style="background: var(--bg-card); padding: 2rem; border-radius: 8px;">
                        <p>${movie.description}</p>
                        <br><a href="index.html" class="btn-primary">Back to Home</a>
                    </div>`;
            }
        }

        window.onload = start;
    </script>
</body>
</html>
