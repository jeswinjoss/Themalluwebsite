<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Property of Jeswin Jose</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100;400;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon: #00f2ff;
            --dark: #020202;
        }
        body {
            background-color: var(--dark);
            font-family: 'Outfit', sans-serif;
            overflow: hidden;
        }

        /* Animated Grain/Noise Overlay */
        .noise::before {
            content: "";
            position: fixed;
            top: -100%; left: -100%; width: 300%; height: 300%;
            background-image: url('https://grainy-gradients.vercel.app/noise.svg');
            opacity: 0.08;
            pointer-events: none;
            animation: noise-move 8s steps(10) infinite;
            z-index: 10;
        }
        @keyframes noise-move {
            0% { transform: translate(0,0); }
            10% { transform: translate(-5%,-5%); }
            20% { transform: translate(-10%,5%); }
            100% { transform: translate(5%,5%); }
        }

        /* Dynamic Spotlight Follower (CSS-only version) */
        .spotlight {
            position: fixed;
            inset: 0;
            background: radial-gradient(600px circle at var(--x, 50%) var(--y, 50%), rgba(0, 242, 255, 0.08), transparent 40%);
            z-index: -1;
        }

        /* Cyber-morphic Card */
        .cyber-card {
            background: linear-gradient(145deg, rgba(15, 15, 15, 0.9), rgba(5, 5, 5, 1));
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 0 80px -20px rgba(0, 242, 255, 0.1);
            position: relative;
            backdrop-filter: blur(20px);
        }

        /* Floating Animation with slight rotation */
        .float { animation: hover-float 8s ease-in-out infinite; }
        @keyframes hover-float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            33% { transform: translateY(-20px) rotate(1deg); }
            66% { transform: translateY(-10px) rotate(-1deg); }
        }

        .neon-line {
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--neon), transparent);
            width: 100%;
            filter: drop-shadow(0 0 5px var(--neon));
        }

        .btn-cyber {
            clip-path: polygon(10% 0, 100% 0, 100% 70%, 90% 100%, 0 100%, 0 30%);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .btn-cyber:hover {
            transform: scale(1.05);
            filter: brightness(1.2) drop-shadow(0 0 15px var(--neon));
        }
    </style>
</head>
<body class="text-white min-h-screen flex items-center justify-center p-6 noise">
    <div class="spotlight" id="spotlight"></div>

    <div class="float cyber-card max-w-lg w-full rounded-tr-[5rem] rounded-bl-[5rem] p-10 md:p-16 overflow-hidden">
        
        <div class="flex items-center justify-between mb-12">
            <div class="flex items-center gap-2">
                <div class="w-3 h-3 bg-[#00f2ff] rounded-full animate-pulse shadow-[0_0_10px_#00f2ff]"></div>
                <span class="text-[10px] tracking-[0.4em] uppercase font-black text-slate-500">Asset Record #2026-JJ</span>
            </div>
            <div class="text-right">
                <p class="text-[10px] tracking-[0.2em] font-bold text-sky-400">STATUS: PARKED</p>
            </div>
        </div>

        <div class="relative z-20">
            <div class="mb-4">
                <h1 class="text-xs uppercase tracking-[1em] text-white/30 font-light">Digital Property</h1>
                <h2 id="domain-name" class="text-4xl md:text-5xl font-black italic tracking-tighter mb-4 text-white">
                    DOMAIN.COM
                </h2>
                <div class="neon-line opacity-30"></div>
            </div>

            <p class="text-slate-400 text-sm leading-loose mb-12 max-w-[280px]">
                This domain is managed & secured by <span class="text-white border-b-2 border-sky-500">Jeswin Jose</span>. Available for strategic acquisition.
            </p>

            <div class="space-y-4">
                <a href="mailto:dev.jeswinjose@gmail.com" class="btn-cyber block w-full py-5 bg-white text-black font-black text-center tracking-widest text-sm hover:bg-[#00f2ff]">
                    INQUIRE NOW
                </a>
                <a href="https://www.jeswinjose.online" class="block w-full py-5 border border-white/10 text-white font-bold text-center tracking-widest text-xs hover:bg-white/5 transition-all">
                    DEVELOPER PORTFOLIO
                </a>
            </div>
        </div>

        <div class="absolute -bottom-10 -right-10 text-9xl font-black text-white/5 select-none pointer-events-none">
            JJ
        </div>
    </div>

    <div class="fixed bottom-8 text-[9px] tracking-[0.5em] text-white/20 uppercase">
        Jeswin Jose initiatives • Thrissur, Kerala
    </div>

    <script>
        // Update Domain Name
        document.getElementById('domain-name').innerText = window.location.hostname.toUpperCase() || "themallu.online";

        // Mouse Spotlight Effect
        window.addEventListener('mousemove', e => {
            const spotlight = document.getElementById('spotlight');
            const x = (e.clientX / window.innerWidth) * 100;
            const y = (e.clientY / window.innerHeight) * 100;
            spotlight.style.setProperty('--x', x + '%');
            spotlight.style.setProperty('--y', y + '%');
        });
    </script>
</body>
</html>
