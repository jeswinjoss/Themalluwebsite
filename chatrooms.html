<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chatrooms | The Mallu Online</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = {
            theme: { 
                extend: { 
                    fontFamily: { sans: ['"Space Grotesk"', 'sans-serif'] }, 
                    boxShadow: { 'brutal': '6px 6px 0px 0px rgba(0,0,0,1)' },
                    colors: {
                        brand: { yellow: '#ffd230', green: '#2e7d32', pink: '#ff4d8d', blue: '#4d9fff', purple: '#b57aff' }
                    }
                } 
            }
        }
    </script>
</head>
<body class="bg-[#fbf8f1] p-4 md:p-10">
    <div class="max-w-6xl mx-auto">
        <header class="mb-12 flex flex-col md:flex-row justify-between items-start md:items-center border-b-4 border-black pb-6 gap-4">
            <div>
                <h1 class="text-5xl font-extrabold uppercase tracking-tighter">Live <span class="text-brand-green">Junctions</span></h1>
                <p class="font-bold text-gray-600 uppercase text-sm mt-2">Pick a room or start your own.</p>
            </div>
            <div class="flex gap-4">
                <button onclick="toggleModal(true)" class="bg-brand-yellow border-2 border-black px-6 py-2 font-bold shadow-brutal hover:bg-black hover:text-white transition-all uppercase text-sm">
                    + Create Room
                </button>
                <a href="explore.html" class="bg-white border-2 border-black px-6 py-2 font-bold shadow-brutal hover:bg-black hover:text-white transition-all uppercase text-sm">
                    ← Back
                </a>
            </div>
        </header>

        <div id="rooms-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
            <div class="bg-white border-4 border-black p-8 shadow-brutal animate-pulse">
                <div class="w-12 h-12 bg-gray-200 mb-4"></div>
                <div class="h-6 bg-gray-200 w-3/4 mb-4"></div>
            </div>
        </div>
    </div>

    <div id="create-modal" class="fixed inset-0 bg-black/50 flex items-center justify-center z-50 hidden p-4">
        <div class="bg-white border-4 border-black p-8 shadow-brutal max-w-md w-full">
            <h2 class="text-3xl font-black uppercase mb-6">Start a Junction</h2>
            <div class="space-y-4">
                <div>
                    <label class="block font-bold uppercase text-sm mb-1">Room Name</label>
                    <input id="new-room-name" type="text" placeholder="e.g. Kozhikode Foodies" class="w-full border-2 border-black p-3 font-bold focus:bg-brand-yellow outline-none">
                </div>
                <div>
                    <label class="block font-bold uppercase text-sm mb-1">Description</label>
                    <textarea id="new-room-desc" placeholder="What's the vibe?" class="w-full border-2 border-black p-3 font-bold focus:bg-brand-yellow outline-none h-24"></textarea>
                </div>
                <div class="flex gap-4 pt-4">
                    <button onclick="createNewRoom()" class="flex-1 bg-brand-green text-white border-2 border-black py-3 font-bold uppercase shadow-brutal active:shadow-none transition-all">Create</button>
                    <button onclick="toggleModal(false)" class="flex-1 bg-white border-2 border-black py-3 font-bold uppercase shadow-brutal">Cancel</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://ycsnoukzbcpolnckzebz.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inljc25vdWt6YmNwb2xuY2t6ZWJ6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY5NDQyNzksImV4cCI6MjA5MjUyMDI3OX0.QRMdgbxyHh2lMkOlaw4aIVFQndtUnSbf-9jdRppLSv8';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const roomStyles = {
            'Chaya Kada': { icon: 'fa-mug-hot', color: 'bg-brand-yellow' },
            'Cinema Paradiso': { icon: 'fa-film', color: 'bg-brand-pink' },
            'Tech Varthakal': { icon: 'fa-mobile-screen', color: 'bg-brand-blue' },
            'Pravasi Corner': { icon: 'fa-earth-asia', color: 'bg-brand-green' },
            'Mallu Finance Hub': { icon: 'fa-chart-line', color: 'bg-brand-purple' },
            'Thrissur Pooram': { icon: 'fa-drum', color: 'bg-orange-400' }
        };

        function toggleModal(show) {
            document.getElementById('create-modal').classList.toggle('hidden', !show);
        }

        async function createNewRoom() {
            const name = document.getElementById('new-room-name').value;
            const description = document.getElementById('new-room-desc').value;

            if (!name) return alert("Please enter a room name!");

            const { data, error } = await _supabase
                .from('chat_rooms')
                .insert([{ name, description, is_group: true }])
                .select();

            if (error) {
                alert("Error creating room: " + error.message);
            } else {
                toggleModal(false);
                fetchRooms(); // Refresh the list
            }
        }

        async function fetchRooms() {
            const container = document.getElementById('rooms-container');
            const { data: rooms, error } = await _supabase
                .from('chat_rooms')
                .select('*')
                .eq('is_group', true)
                .order('created_at', { ascending: false });

            if (error) {
                container.innerHTML = `<div class="col-span-full font-bold text-red-500">Error loading rooms.</div>`;
                return;
            }

            container.innerHTML = ''; 
            rooms.forEach(room => {
                const style = roomStyles[room.name] || { icon: 'fa-comments', color: 'bg-white' };
                container.innerHTML += `
                    <div class="${style.color} border-4 border-black p-6 shadow-brutal hover:-translate-y-2 transition-transform flex flex-col h-full">
                        <div class="flex justify-between items-start mb-6">
                            <div class="bg-white border-2 border-black p-3 shadow-brutal"><i class="fa-solid ${style.icon} text-2xl"></i></div>
                            <span class="bg-white border-2 border-black px-2 py-1 font-bold text-xs uppercase shadow-brutal text-brand-green">● Live</span>
                        </div>
                        <h3 class="text-2xl font-black uppercase mb-2 tracking-tight">${room.name}</h3>
                        <p class="font-bold text-sm mb-8 flex-grow">${room.description || 'Welcome to the junction!'}</p>
                        <button onclick="window.location.href='chat.html?room=${room.id}'" class="w-full bg-black text-white border-2 border-black py-3 font-bold uppercase shadow-brutal hover:bg-white hover:text-black transition-all">Enter Junction</button>
                    </div>`;
            });
        }

        fetchRooms();
    </script>
</body>
</html>
