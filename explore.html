<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Explore | The Mallu Online</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = {
            theme: { extend: { fontFamily: { sans: ['"Space Grotesk"', 'sans-serif'] }, boxShadow: { 'brutal': '6px 6px 0px 0px rgba(0,0,0,1)' } } }
        }
    </script>
</head>
<body class="bg-[#fbf8f1] p-6 flex items-center justify-center min-h-screen">
    <div class="max-w-4xl w-full">
        <h1 class="text-5xl font-extrabold uppercase mb-12 text-center">Select Your <span class="bg-yellow-400 px-2 border-4 border-black shadow-brutal">Vibe</span></h1>
        
        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
            <div onclick="window.location.href='chatrooms.html'" class="bg-green-500 border-4 border-black p-8 shadow-brutal cursor-pointer hover:-translate-y-2 transition-transform group">
                <div class="bg-white border-2 border-black w-16 h-16 flex items-center justify-center mb-6 shadow-brutal group-hover:bg-yellow-400">
                    <i class="fa-solid fa-users text-3xl"></i>
                </div>
                <h2 class="text-3xl font-extrabold uppercase mb-2">Public Rooms</h2>
                <p class="font-bold mb-4">No Login. Just enter a nickname and start chatting in the Kavala.</p>
                <span class="inline-block bg-black text-white px-4 py-2 font-bold uppercase">Enter Now →</span>
            </div>

            <div class="bg-gray-200 border-4 border-black p-8 shadow-brutal opacity-60 cursor-not-allowed relative overflow-hidden">
                <div class="absolute top-4 right-4 bg-red-500 text-white text-xs font-bold px-2 py-1 border-2 border-black rotate-12 uppercase">
                    Coming Soon
                </div>
                <div class="bg-white border-2 border-black w-16 h-16 flex items-center justify-center mb-6 shadow-brutal">
                    <i class="fa-solid fa-lock text-3xl"></i>
                </div>
                <h2 class="text-3xl font-extrabold uppercase mb-2">Private Chat</h2>
                <p class="font-bold mb-4">1-on-1 messaging. (Requires Login for safety and persistence).</p>
                <span class="inline-block border-2 border-black px-4 py-2 font-bold uppercase text-gray-500 italic">Feature Locked</span>
            </div>
        </div>
    </div>
</body>
</html>
